[builds]
[[builds]]
  src = "src/app/page.tsx"
  use = "@cloudflare/nextjs"

[[builds]]
  src = "src/**/*"
  use = "@cloudflare/nextjs"

[env]
  NODE_VERSION = "18"

[env.production]
  NODE_ENV = "production"
  NEXT_PUBLIC_API_URL = "https://api.self.app"
  NEXT_PUBLIC_SELF_CHAIN_ID = "1"
  NEXT_PUBLIC_SELF_NETWORK = "mainnet"
  NEXT_PUBLIC_WEB3_PROVIDER_URL = "https://rpc.self.app"

[env.development]
  NODE_ENV = "development"
  NEXT_PUBLIC_API_URL = "https://api.self.app"
  NEXT_PUBLIC_SELF_CHAIN_ID = "1"
  NEXT_PUBLIC_SELF_NETWORK = "mainnet"
  NEXT_PUBLIC_WEB3_PROVIDER_URL = "https://rpc.self.app"

[env.test]
  NODE_ENV = "test"
  NEXT_PUBLIC_API_URL = "https://api.self.app"
  NEXT_PUBLIC_SELF_CHAIN_ID = "1"
  NEXT_PUBLIC_SELF_NETWORK = "mainnet"
  NEXT_PUBLIC_WEB3_PROVIDER_URL = "https://rpc.self.app"

[env.staging]
  NODE_ENV = "staging"
  NEXT_PUBLIC_API_URL = "https://api.self.app"
  NEXT_PUBLIC_SELF_CHAIN_ID = "1"
  NEXT_PUBLIC_SELF_NETWORK = "mainnet"
  NEXT_PUBLIC_WEB3_PROVIDER_URL = "https://rpc.self.app"
