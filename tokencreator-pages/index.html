<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELF Chain Token Creator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-100">
    <div class="container">
        <div class="header">
            <img src="https://docs.self.app/img/SELFwhitelogo.png" alt="SELF Logo" class="logo">
            <h1 class="text-3xl font-bold">SELF Chain Token Creator</h1>
        </div>
        
        <div class="max-w-4xl mx-auto card">
            <h1 class="text-3xl font-bold text-center mb-8">Create Your Token</h1>
            
            <div class="space-y-6">
                <!-- Token Type Selection -->
                <div class="form-group">
                    <label class="block text-sm font-medium mb-2">Token Type</label>
                    <div class="flex space-x-4">
    <div class="space-y-6">
                <!-- Token Type Selection -->
                <div class="form-group">
                    <label class="block text-sm font-medium mb-2">Token Type</label>
                    <div class="flex space-x-4">
                        <button onclick="selectTokenType('erc20')" class="w-1/2 px-4 py-2 primary">ERC20 Token</button>
                        <button onclick="selectTokenType('nft')" class="w-1/2 px-4 py-2 secondary">NFT Collection</button>
                    </div>
                </div>

                <!-- ERC20 Form -->
                <div id="erc20-form" class="hidden">
                    <div class="grid grid-cols-1 gap-6">
                        <div class="form-group">
                            <label class="block text-sm font-medium">Token Name</label>
                            <input type="text" id="tokenName" class="mt-1 block w-full" placeholder="e.g., Self Token">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Token Symbol</label>
                            <input type="text" id="tokenSymbol" class="mt-1 block w-full" placeholder="e.g., SELF">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Decimals</label>
                            <select id="decimals" class="mt-1 block w-full">
                                <option value="18">18 (Recommended)</option>
                                <option value="6">6</option>
                                <option value="0">0</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Total Supply</label>
                            <input type="number" id="totalSupply" class="mt-1 block w-full" placeholder="e.g., 1000000">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Description</label>
                            <textarea id="description" class="mt-1 block w-full" rows="3"></textarea>
                        </div>
                    </div>
                </div>

                <!-- NFT Form -->
                <div id="nft-form" class="hidden">
                    <div class="grid grid-cols-1 gap-6">
                        <div class="form-group">
                            <label class="block text-sm font-medium">Collection Name</label>
                            <input type="text" id="collectionName" class="mt-1 block w-full" placeholder="e.g., Self Art Collection">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Collection Symbol</label>
                            <input type="text" id="collectionSymbol" class="mt-1 block w-full" placeholder="e.g., SART">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Base URI</label>
                            <input type="text" id="baseURI" class="mt-1 block w-full" placeholder="e.g., https://api.self.app/nfts/">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium">Description</label>
                            <textarea id="nftDescription" class="mt-1 block w-full" rows="3"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="mt-6">
                    <button onclick="createToken()" class="w-full primary">
                        Create Token
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectTokenType(type) {
            document.getElementById('erc20-form').classList.add('hidden');
            document.getElementById('nft-form').classList.add('hidden');
            
            if (type === 'erc20') {
                document.getElementById('erc20-form').classList.remove('hidden');
            } else if (type === 'nft') {
                document.getElementById('nft-form').classList.remove('hidden');
            }
        }

        async function createToken() {
            const type = document.querySelector('button[onclick*="selectTokenType"]').dataset.type;
            let formData;

            if (type === 'erc20') {
                formData = {
                    type: 'erc20',
                    name: document.getElementById('tokenName').value,
                    symbol: document.getElementById('tokenSymbol').value,
                    decimals: document.getElementById('decimals').value,
                    totalSupply: document.getElementById('totalSupply').value,
                    description: document.getElementById('description').value
                };
            } else {
                formData = {
                    type: 'nft',
                    name: document.getElementById('collectionName').value,
                    symbol: document.getElementById('collectionSymbol').value,
                    baseURI: document.getElementById('baseURI').value,
                    description: document.getElementById('nftDescription').value
                };
            }

            try {
                const response = await fetch('/api/create-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                if (response.ok) {
                    alert('Token created successfully! Contract address: ' + result.contractAddress);
                } else {
                    alert('Error creating token: ' + result.error);
                }
            } catch (error) {
                alert('An error occurred: ' + error.message);
            }
        }
    </script>
</body>
</html>
