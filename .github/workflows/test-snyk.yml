name: Test Snyk Integration

on:
  workflow_dispatch:

jobs:
  test-snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Snyk test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          working-directory: selfswap
          args: --severity-threshold=high
          command: test
