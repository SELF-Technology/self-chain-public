name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Run npm audit
      - name: Run npm audit
        run: npm audit --json > audit.json

      # Check for vulnerabilities
      - name: Check vulnerabilities
        run: |
          if [ $(npm audit --json | jq '.advisories | length') -gt 0 ]; then
            echo "Vulnerabilities found!"
            npm audit
            exit 1
          fi

      # Run Snyk security scan
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test

      - name: Run Snyk Node.js scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          working-directory: selfswap
          args: --severity-threshold=high
          command: test

      # Run OWASP ZAP scan
      - name: Run OWASP ZAP scan
        uses: zaproxy/zap-action@v1
        with:
          target: 'http://localhost:3000'
          spider: true
          scan: true
          report: true
          config: |
            api.disablekey=true
            connection.timeout=30000
            connection.maxtimeout=300000
            connection.maxretries=3
